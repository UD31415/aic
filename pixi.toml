[workspace]
name = "aic"
authors = ["Teo Koon Peng <koonpeng@intrinsic.ai>"]
channels = ["robostack-kilted", "conda-forge", "https://prefix.dev/robostack-kilted", "https://prefix.dev/conda-forge"]
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"
conda-pypi-map = { "robostack-kilted" = "robostack_mapping.json" }
preview = ["pixi-build"]

[target.linux-64.dependencies]
evdev = ">=1.9.2,<2"

[dependencies]
isort = "==5.13.2"                                                                     # version bundled by the vscode extension
json5 = ">=0.13.0,<0.14"                                                               # version bundled by the vscode extension
numpy = "<2.3.0"
packaging = ">=24.2,<26.0"                                                             # required by lerobot==0.4.3
pyright = "==1.1.408"
ros-kilted-aic-control-interfaces = { path = "aic_interfaces/aic_control_interfaces" }
ros-kilted-aic-example-policies = { path = "aic_example_policies" }
ros-kilted-aic-model = { path = "aic_model" }
ros-kilted-aic-model-interfaces = { path = "aic_interfaces/aic_model_interfaces" }
ros-kilted-aic-task-interfaces = { path = "aic_interfaces/aic_task_interfaces" }
ros-kilted-aic-teleoperation = { path = "aic_utils/aic_teleoperation" }
ros-kilted-aic-training-interfaces = { path = "aic_utils/aic_training_interfaces" }
ros-kilted-control-msgs = "*"                                                          # lerobot_robot_ros
ros-kilted-geometry-msgs = "*"                                                         # lerobot_robot_ros
ros-kilted-lerobot-robot-aic = { path = "aic_utils/lerobot_robot_aic" }
ros-kilted-moveit-msgs = "*"                                                           # lerobot_robot_ros
ros-kilted-rclpy = "*"
ros-kilted-rmw-zenoh-cpp = "*"
ros-kilted-ros-core = "*"
ros-kilted-sensor-msgs = "*"                                                           # lerobot_robot_ros
ros-kilted-std-msgs = "*"                                                              # lerobot_robot_ros
ros-kilted-std-srvs = "*"
ros-kilted-tf2-ros-py = "*"
setuptools = ">=71.0.0,<81.0.0"                                                        # required by lerobot==0.4.3
ros-kilted-ros-base = "*"
pkg-config = "*"
compilers = "*"
make = "*"
ninja = "*"
ros-kilted-ros2cli = "*"


# Build tools
colcon-common-extensions = "*"
cmake = "<4"

# Workspace dependencies
eigen = "*"
libopencv = "*"
py-opencv = "*"
ros-kilted-ament-cmake = "*"
ros-kilted-ament-cmake-ros = "*"
ros-kilted-ament-index-cpp = "*"
ros-kilted-ament-lint-auto = "*"
ros-kilted-ament-lint-common = "*"
ros-kilted-builtin-interfaces = "*"
ros-kilted-controller-interface = "*"
ros-kilted-controller-manager = "*"
ros-kilted-controller-manager-msgs = "*"
ros-kilted-generate-parameter-library = "*"
ros-kilted-gz-cmake-vendor = "*"
ros-kilted-gz-common-vendor = "*"
ros-kilted-gz-plugin-vendor = "*"
ros-kilted-gz-sim-vendor = "*"
ros-kilted-hardware-interface = "*"
ros-kilted-joint-limits = "*"
ros-kilted-kdl-parser = "*"
ros-kilted-kinematics-interface = "*"
ros-kilted-kinematics-interface-kdl = "*"
ros-kilted-launch = "*"
ros-kilted-launch-ros = "*"
ros-kilted-lifecycle = "*"
ros-kilted-lifecycle-msgs = "*"
ros-kilted-pluginlib = "*"
ros-kilted-rclcpp = "*"
ros-kilted-rclcpp-action = "*"
ros-kilted-rclcpp-components = "*"
ros-kilted-rclcpp-lifecycle = "*"
ros-kilted-realtime-tools = "*"
ros-kilted-robot-state-publisher = "*"
ros-kilted-ros-gz-bridge = "*"
ros-kilted-ros-gz-interfaces = "*"
ros-kilted-ros-gz-sim = "*"
ros-kilted-rosbag2-cpp = "*"
ros-kilted-rosidl-default-generators = "*"
ros-kilted-rosidl-default-runtime = "*"
ros-kilted-rviz2 = "*"
ros-kilted-simulation-interfaces = "*"
ros-kilted-tf2 = "*"
ros-kilted-tf2-eigen = "*"
ros-kilted-tf2-geometry-msgs = "*"
ros-kilted-tf2-msgs = "*"
ros-kilted-tf2-ros = "*"
ros-kilted-topic-tools = "*"
ros-kilted-trajectory-msgs = "*"
ros-kilted-ur-description = "*"
ros-kilted-xacro = "*"
ros-kilted-yaml-cpp-vendor = "*"
transforms3d = "*"

# The following packages were not found:
# ros-kilted-sophus = "*"

[pypi-dependencies]
huggingface-hub = { version = "~=1.7" }
lerobot = "==0.5.1"
lerobot_robot_ros = { git = "https://github.com/koonpeng/lerobot-ros", rev = "87708d0ae14a724bca78f8ae9d55448332509a57", subdirectory = "lerobot_robot_ros" }
lerobot_teleoperator_devices = { git = "https://github.com/koonpeng/lerobot-ros", rev = "87708d0ae14a724bca78f8ae9d55448332509a57", subdirectory = "lerobot_teleoperator_devices" }
mujoco = "==3.5.0"
pynput = ">=1.7.6,<2"
pyspacemouse = ">=2.0.0, <3"

[activation]
scripts = ["pixi_env_setup.sh"]

[tasks]
build = {cmd = "colcon build", description = "Build the ROS workspace"}
test = {cmd = "colcon test", description = "Run tests for the workspace"}
clean = {cmd = "rm -rf build install log", description = "Clean build artifacts (build, install, log directories)"}
